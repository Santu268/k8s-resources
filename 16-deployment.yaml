apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-dep
  labels: # related deploy resource
    project: roboshop
    component: deploy
    tier: pod-deploy
spec:
  replicas: 3
  selector:
    matchLabels:
      project: roboshop
      component: deploy
      tier: pod-deploy  
  # strategy:
  #   type: RollingUpdate
  #   rollingUpdate:
  #     maxSurge: 1        # How many extra pods can be created during update
  #     maxUnavailable: 0  # How many pods can be offline during update
  template:
    metadata:
      labels:
        project: roboshop
        component: deploy
        tier: pod-deploy
    spec:
      containers:
        - name: nginx
          image: nginx:1.24           
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pod-dep
  labels:
    project: roboshop
    component: deploy
    tier: pod-deploy
spec:
  selector:
    project: roboshop
    component: deploy
    tier: pod-deploy
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

